<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neko-Love API Docs | Redoc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6ede1;
      --paper: rgba(255, 251, 246, 0.95);
      --ink: #1d1916;
      --muted: #6f665f;
      --line: rgba(32, 22, 14, 0.12);
      --accent: #de6d3f;
      --teal: #1e5756;
      --shadow: 0 22px 60px rgba(68, 47, 27, 0.15);
      --sans: "Space Grotesk", "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at top left, rgba(222,109,63,0.18), transparent 24%),
        linear-gradient(180deg, #f7efe3 0%, #ecddc8 100%);
    }
    .shell {
      max-width: 1420px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }
    .hero {
      margin-bottom: 20px;
      padding: 28px;
      border-radius: 30px;
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
      font-weight: 800;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 6vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }
    .sub {
      margin-top: 14px;
      max-width: 70ch;
      color: var(--muted);
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      color: var(--ink);
    }
    .links a.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #b84b22);
    }
    #redoc-wrap {
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <p class="eyebrow">Static API Docs</p>
      <h1>Neko-Love with Redoc</h1>
      <div class="sub">Use this version if you prefer a more classic API handbook layout for your static site.</div>
      <div class="links">
        <a class="primary" href="./">Scalar View</a>
        <a href="./redoc.html">Redoc View</a>
        <a href="../openapi.json">OpenAPI JSON</a>
        <a href="../">Back to site</a>
      </div>
    </section>

    <section id="redoc-wrap">
      <redoc spec-url="../openapi.json"></redoc>
    </section>
  </div>

  <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
</body>
</html>
